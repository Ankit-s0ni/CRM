<script>
        // Simple visual simulation of the "capture" process
        document.addEventListener('DOMContentLoaded', () => {
            const loadingFill = document.getElementById('loading-fill');
            let progress = 0;
            
            const interval = setInterval(() => {
                progress += 1;
                if (progress > 100) progress = 0;
                // We're just letting the CSS animation handle it for now
            }, 30);
        });

        // Toggle dark mode class to ensure surface colors are applied if needed 
        // though this specific screen is mostly dark by design
        document.documentElement.classList.add('dark');
    </script>

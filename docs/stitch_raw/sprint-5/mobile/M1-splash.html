<style>
        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.95; }
        }
        .animate-pulse-subtle {
            animation: subtle-pulse 3s ease-in-out infinite;
        }
        
        @keyframes dot-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-4px); opacity: 1; }
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #4f46e5;
            display: inline-block;
            animation: dot-bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        body {
            background-color: #fcf8ff; /* surface color */
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen overflow-hidden">
<!-- Main Splash Canvas -->
<main class="flex flex-col items-center justify-between w-full h-screen max-w-md px-container-margin py-xl relative">
<!-- Top space filler to balance centering -->
<div class="h-14 w-full"></div>
<!-- Center Content: Logo and Status -->
<div class="flex flex-col items-center gap-lg">
<div class="relative w-32 h-32 flex items-center justify-center animate-pulse-subtle">
<!-- Branding Image -->
<img alt="Acme Industries Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLtbo8N6ilLshQQBoqgDFM7X7fTCyA5ABSHAds2IrQc5RZ57A6A2JCXsPqBIg-cihXGzj6RWG7ROUDETDs8VLv6FAkw4tj7F1sHmdv9yU_jCxPnWO1cOYP4n45D7oNNmGm-xQ9Sc1937l70nlbnTt_vQrawhx0Hbh9ONNtiar7Kc-uCCOE5uyHj8arczYC8a-hwzb3JEJ4-RKNxaUciep3rwOu0QRjLvpeP58noDGiO6JV2PtfGNyLAfWA"/>
</div>
<div class="flex flex-col items-center gap-xs">
<p class="font-body-md text-body-md text-on-surface-variant tracking-wide">
                    Checking session...
                </p>
</div>
</div>
<!-- Bottom Content: Branding & Progress -->
<div class="flex flex-col items-center gap-sm">
<!-- Indigo Progress Dots -->
<div class="flex gap-xs items-center h-4">
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>
<p class="font-label-md text-label-md text-outline tracking-widest uppercase">
                Powered by HRMS
            </p>
</div>
</main>
<!-- Subtle Background Ambient Effect (Micro-interaction) -->
<div class="absolute inset-0 -z-10 opacity-30 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/10 blur-[100px]"></div>
</div>
<!-- Micro-interaction logic for simulated transition -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // This is a splash screen, usually it redirects after a few seconds
            // For the sake of UI demonstration, we'll just log the "session check"
            console.log("HRMS Splash Initialized: Checking session state...");
            
            // Interaction: Subtle tap to "skip" or see interaction feedback
            document.body.addEventListener('click', () => {
                const statusText = document.querySelector('p.text-body-md');
                if(statusText) {
                    statusText.textContent = "Establishing secure connection...";
                    setTimeout(() => {
                        statusText.textContent = "Redirecting to Dashboard...";
                    }, 1000);
                }
            });
        });
    </script>
</body></html>

      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 2s linear infinite;
    }
    .progress-bar-fill {
      width: 75%;
      transition: width 2s ease-in-out;
    }

<!-- Pulse Effect -->

</div>
<!-- Checklist Card -->
<div class="w-full max-w-sm bg-surface-container-lowest rounded-xl p-lg shadow-sm border border-outline-variant space-y-md">
<!-- Item 1: Device (Resolved) -->
<div class="flex items-center justify-between py-xs">
<div class="flex items-center gap-md">
<div class="h-8 w-8 rounded-full bg-green-100 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-label-md text-on-surface">Device compatibility</span>
</div>
<span class="text-green-600 font-label-sm">Verified</span>
</div>
<div class="h-px bg-outline-variant opacity-30"></div>

</div>

</div>
<span class="text-green-600 font-label-sm">Verified</span>
</div>
<div class="h-px bg-outline-variant opacity-30"></div>
<!-- Item 3: Location (Resolved) -->
<div class="flex items-center justify-between py-xs">
<div class="flex items-center gap-md">
<div class="h-8 w-8 rounded-full bg-green-100 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-label-md text-on-surface">Location match</span>
</div>
<span class="text-green-600 font-label-sm">Verified</span>
</div>
<div class="h-px bg-outline-variant opacity-30"></div>

<div class="flex items-center gap-md">
<div class="h-8 w-8 rounded-full bg-primary-container text-white flex items-center justify-center">
<span class="material-symbols-outlined animate-spin-slow">progress_activity</span>
</div>
<span class="font-label-md text-on-surface font-semibold">Face match</span>
</div>

<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
<div class="h-full bg-primary progress-bar-fill rounded-full shadow-[0_0_8px_rgba(53,37,205,0.4)]"></div>
</div>
</div>
</div>
<!-- Skeleton Shimmer Placeholder for next step -->
<div class="w-full max-w-sm mt-md opacity-40">
<div class="h-12 w-full shimmer rounded-lg"></div>
</div>

<!-- Bottom Message Section -->
<footer class="mt-auto px-container-margin pb-xl text-center">
<p class="text-on-surface-variant font-body-md max-w-[280px] mx-auto">
      Do not close the app. We're finalizing your attendance punch.
    </p>
<!-- Micro-interaction script for progress simulation -->
<script>
      document.addEventListener('DOMContentLoaded', () => {
        const progressBar = document.querySelector('.progress-bar-fill');
        setTimeout(() => {
          progressBar.style.width = '88%';
        }, 1000);
      });
    </script>
</footer>
<!-- Background Ambience (Subtle Gradient) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary opacity-[0.03] blur-[120px] rounded-full"></div>

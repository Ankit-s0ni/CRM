<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Login - Acme Industries</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#4f46e5",
                    "tertiary-container": "#a44100",
                    "secondary-fixed": "#d3e4fe",
                    "surface-container-highest": "#e4e1ee",
                    "on-tertiary": "#ffffff",
                    "on-background": "#1b1b24",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "surface-container": "#f0ecf9",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "primary": "#3525cd",
                    "error-container": "#ffdad6",
                    "tertiary": "#7e3000",
                    "primary-fixed-dim": "#c3c0ff",
                    "surface-bright": "#fcf8ff",
                    "surface": "#fcf8ff",
                    "primary-fixed": "#e2dfff",
                    "secondary-container": "#d0e1fb",
                    "on-tertiary-container": "#ffd2be",
                    "inverse-surface": "#302f39",
                    "outline": "#777587",
                    "background": "#fcf8ff",
                    "on-primary-container": "#dad7ff",
                    "surface-dim": "#dcd8e5",
                    "surface-container-low": "#f5f2ff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#b7c8e1",
                    "outline-variant": "#c7c4d8",
                    "on-secondary-container": "#54647a",
                    "tertiary-fixed": "#ffdbcc",
                    "secondary": "#505f76",
                    "inverse-on-surface": "#f3effc",
                    "on-error-container": "#93000a",
                    "on-surface": "#1b1b24",
                    "on-secondary-fixed": "#0b1c30",
                    "tertiary-fixed-dim": "#ffb695",
                    "surface-variant": "#e4e1ee",
                    "inverse-primary": "#c3c0ff",
                    "surface-tint": "#4d44e3",
                    "on-tertiary-fixed": "#351000",
                    "on-primary-fixed": "#0f0069",
                    "on-surface-variant": "#464555",
                    "on-primary-fixed-variant": "#3323cc",
                    "on-secondary-fixed-variant": "#38485d",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#eae6f4",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-margin": "16px",
                    "gutter": "12px",
                    "xs": "4px",
                    "lg": "24px",
                    "base": "8px",
                    "sm": "8px",
                    "md": "16px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #F8FAFC; /* Slate 50 as per style guidance Level 0 */
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .login-card {
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.05), 0px 4px 6px rgba(15, 23, 42, 0.05); /* Level 1 shadow */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Keyboard aware focus simulation */
        input:focus {
            outline: none;
            border-color: #3525cd !important;
            box-shadow: 0 0 0 2px rgba(53, 37, 205, 0.1);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-container-margin overflow-x-hidden">
<!-- Login Container -->
<main class="w-full max-w-md flex flex-col items-center">
<!-- Logo & Branding Section -->
<section class="flex flex-col items-center mb-xl animate-in fade-in duration-700">
<div class="mb-md">
<img alt="Acme Industries Logo" class="w-20 h-20 rounded-xl" src="https://lh3.googleusercontent.com/aida/AP1WRLtbo8N6ilLshQQBoqgDFM7X7fTCyA5ABSHAds2IrQc5RZ57A6A2JCXsPqBIg-cihXGzj6RWG7ROUDETDs8VLv6FAkw4tj7F1sHmdv9yU_jCxPnWO1cOYP4n45D7oNNmGm-xQ9Sc1937l70nlbnTt_vQrawhx0Hbh9ONNtiar7Kc-uCCOE5uyHj8arczYC8a-hwzb3JEJ4-RKNxaUciep3rwOu0QRjLvpeP58noDGiO6JV2PtfGNyLAfWA"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-background tracking-tight">Acme Industries</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Enterprise Workforce Management</p>
</section>
<!-- Login Form Card -->
<div class="login-card bg-surface-container-lowest w-full rounded-xl p-md md:p-lg border border-outline-variant">
<form class="flex flex-col gap-lg" id="loginForm" onsubmit="event.preventDefault();">
<!-- Email/Phone Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="username">Email or Phone Number</label>
<div class="relative group">
<input class="w-full h-11 px-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md transition-all duration-200" id="username" name="username" placeholder="name@company.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full h-11 px-md pr-12 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-lg" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 bg-primary-container text-on-primary font-bold rounded-lg font-body-lg text-body-lg active:scale-[0.98] transition-all duration-200 shadow-md hover:bg-primary" type="submit">
                    Sign in
                </button>
</form>
</div>
<!-- Footer Note -->
<footer class="mt-xl text-center px-lg">
<p class="font-body-md text-body-md text-on-surface-variant">
                Contact HR if you don't have credentials
            </p>
<div class="mt-md flex justify-center gap-md">
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Privacy Policy</a>
<span class="text-outline-variant">•</span>
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Terms of Service</a>
</div>
</footer>
</main>
<!-- Optional Atmospheric Background Decoration (Non-intrusive) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-20">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[30%] h-[30%] bg-secondary-fixed rounded-full blur-[100px]"></div>
</div>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.textContent = 'visibility';
            }
        }

        // Keyboard aware interaction: Adjust layout or scroll if needed on mobile
        window.addEventListener('resize', () => {
            if (window.innerHeight < 500) {
                document.querySelector('main').classList.remove('justify-center');
                document.querySelector('main').classList.add('pt-lg');
            } else {
                document.querySelector('main').classList.add('justify-center');
                document.querySelector('main').classList.remove('pt-lg');
            }
        });

        // Simple feedback for button click
        document.querySelector('form').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            // Mock delay
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('In a real app, this would initiate the secure authentication flow.');
            }, 1500);
        });
    </script>
</body></html>

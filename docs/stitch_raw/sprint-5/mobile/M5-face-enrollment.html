<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Face Enrollment | Acme Industries</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    /* Custom oval guide mask */
    .face-mask {
      clip-path: path('M 0 0 H 1000 V 1000 H 0 Z M 500 250 C 380 250 280 340 280 500 C 280 660 380 750 500 750 C 620 750 720 660 720 500 C 720 340 620 250 500 250 Z');
      fill-rule: evenodd;
    }

    /* Progress ring animation */
    @keyframes progress-dash {
      from { stroke-dashoffset: 283; }
      to { stroke-dashoffset: 113.2; } /* 60% of 283 */
    }

    .animate-progress {
      stroke-dasharray: 283;
      stroke-dashoffset: 113.2;
      transition: stroke-dashoffset 1s ease-out;
    }

    /* Instruction cycle animation */
    @keyframes fade-cycle {
      0%, 100% { opacity: 0; transform: translateY(10px); }
      10%, 90% { opacity: 1; transform: translateY(0); }
    }
    
    .instruction-fade {
      animation: fade-cycle 3s infinite;
    }
  </style>

            "inverse-surface": "#302f39",

      min-height: max(884px, 100dvh);

<body class="bg-on-background text-on-surface font-body-md overflow-hidden antialiased">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-transparent z-50 flex items-center justify-between px-container-margin h-14">
<button class="w-10 h-10 flex items-center justify-center text-white active:opacity-80 transition-opacity">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-white">Face Enrollment</h1>
<div class="w-10"></div>
</header>
<!-- Camera Preview Layer -->
<main class="fixed inset-0 w-full h-full">
<div class="absolute inset-0 bg-black">
<div class="w-full h-full bg-cover bg-center opacity-80" data-alt="A high-resolution close-up of a professional modern employee's face centered in a studio-lit environment. The person has a neutral, friendly expression. The background is a soft-focus corporate office with minimalist indigo and slate accents. The lighting is bright and even, emphasizing clarity for biometric identification." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAMdwnP_S51eh25f7toLlUtJeIHD9g3dWhluSn17cdwOpGa0Mw6r_UzuRmj3xHkZQiWdd0Mi9MrpDUKQFjoB6Lbs98ZXob8CJloREOwniAR3P89XKbibbJRNLK-Zr4rclGPktmTP-7qLWre04FuOo-fedMHh1hm25fquNzl1fRYT4MPdIwXMmDuM7YyAtX_XBVJ5_h40qX42f-Y3kOwiOitpOxo7ixacz8Pr4JtBGx9h_JbPf9VwK_JmEmYaEvUrH7wIRkBl6vDfQ')"></div>
</div>
<!-- UI Overlay: Instructions -->
<div class="absolute top-24 left-0 right-0 flex justify-center z-20">
<div class="bg-black/60 backdrop-blur-md px-6 py-2 rounded-full border border-white/20">
<p class="text-white font-label-md text-label-md flex items-center gap-2" id="instruction-text">
<span class="material-symbols-outlined text-[18px]">face</span>
<span class="instruction-fade">Center your face</span>
</p>
</div>
</div>
<!-- Oval Guide & Progress Ring -->
<div class="absolute inset-0 pointer-events-none z-10 flex items-center justify-center">
<svg class="w-full h-full" viewbox="0 0 1000 1000">
<!-- Dimmed background with cutout -->
<path d="M 0 0 H 1000 V 1000 H 0 Z M 500 250 C 380 250 280 340 280 500 C 280 660 380 750 500 750 C 620 750 720 660 720 500 C 720 340 620 250 500 250 Z" fill="rgba(0,0,0,0.5)" fill-rule="evenodd"></path>
<!-- Oval Border (Gray) -->
<ellipse cx="500" cy="500" fill="none" rx="220" ry="250" stroke="rgba(255,255,255,0.2)" stroke-width="4"></ellipse>
<!-- Progress Ring (Indigo) - 60% Progress -->
<!-- Circumference ~ 2*pi*sqrt((220^2 + 250^2)/2) approx 1478 units in this scale. 
             Simplified for SVG path length simulation -->
<ellipse class="transition-all duration-1000 ease-in-out" cx="500" cy="500" fill="none" id="progress-ring" rx="220" ry="250" stroke="#4f46e5" stroke-dasharray="1478" stroke-dashoffset="591" stroke-width="8"></ellipse>
</svg>
<!-- Success Icon (Hidden initially, shown in success state) -->
<div class="hidden absolute bg-white text-primary rounded-full p-4 shadow-xl" id="success-checkmark">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Bottom Controls & Sheet -->
<div class="absolute bottom-0 left-0 right-0 z-30">
<!-- Capture Action Area -->
<div class="flex flex-col items-center pb-8 gap-6">
<!-- Progress Indicator Text -->
<div class="bg-primary/20 backdrop-blur-sm px-4 py-1 rounded-full border border-primary/30">
<span class="text-white font-label-md text-label-md">Biometric Analysis: 60%</span>
</div>
<!-- Capture Button (Locked/Grayed) -->
<button class="w-20 h-20 rounded-full bg-outline/20 border-4 border-outline/30 flex items-center justify-center cursor-not-allowed group">
<div class="w-14 h-14 rounded-full bg-outline/40"></div>
</button>
</div>
<!-- Info Bottom Sheet -->
<div class="bg-surface rounded-t-xl p-6 shadow-2xl">
<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-6"></div>
<div class="flex items-start gap-4 mb-6">
<div class="bg-primary-container/10 p-3 rounded-lg text-primary">
<span class="material-symbols-outlined">lock_person</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-1">Identity Verification</h3>
<p class="text-on-surface-variant font-body-md text-body-md">
              This becomes your locked verification photo. It cannot be changed later. 
              Ensure you are in a well-lit area.
            </p>
</div>
</div>
<button class="w-full h-12 bg-outline text-white font-headline-sm rounded-lg opacity-50 cursor-not-allowed flex items-center justify-center gap-2" disabled="">
          Please wait...
        </button>
</div>
</div>
</main>
<script>
    // Instruction cycling logic
    const instructions = ["Center your face", "Blink slowly", "Hold still"];
    const instructionEl = document.getElementById('instruction-text').querySelector('.instruction-fade');
    let currentIndex = 0;

    setInterval(() => {
      currentIndex = (currentIndex + 1) % instructions.length;
      instructionEl.textContent = instructions[currentIndex];
      
      // Trigger simple re-animation
      instructionEl.classList.remove('instruction-fade');
      void instructionEl.offsetWidth; // trigger reflow
      instructionEl.classList.add('instruction-fade');
    }, 3000);

    // Mock Success Trigger (for demonstration)
    // In a real app, this would happen after analysis hits 100%
    function simulateSuccess() {
      setTimeout(() => {
        const ring = document.getElementById('progress-ring');
        ring.setAttribute('stroke-dashoffset', '0');
        ring.setAttribute('stroke', '#4ade80'); // Green
        
        document.getElementById('success-checkmark').classList.remove('hidden');
        document.getElementById('success-checkmark').classList.add('flex');
        
        const mainBtn = document.querySelector('button[disabled]');
        mainBtn.disabled = false;
        mainBtn.classList.remove('bg-outline', 'opacity-50', 'cursor-not-allowed');
        mainBtn.classList.add('bg-primary-container');
        mainBtn.textContent = 'Continue';
      }, 5000);
    }
    
    // simulateSuccess(); // Uncomment to see transition
  </script>
</body></html>

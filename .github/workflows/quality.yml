name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://app_admin:admin_password@localhost:5433/hrms_dev?schema=public
      DATABASE_URL_APP: postgresql://app_user:app_password@localhost:5433/hrms_dev?schema=public
      DATABASE_URL_PLATFORM: postgresql://platform_runtime:platform_password@localhost:5433/hrms_dev?schema=public
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: hrms-uploads
      JWT_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start infrastructure
        run: docker compose up -d --wait postgres redis minio

      - name: Apply migrations and seed
        run: |
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api exec prisma db seed

      - name: Quality gates
        run: pnpm quality

      - name: Start outbox worker
        run: |
          pnpm --filter api start:worker > /tmp/hrms-worker.log 2>&1 &
          echo $! > /tmp/hrms-worker.pid

      - name: API end-to-end tests
        run: pnpm test:e2e

      - name: Install browser runtime
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Platform visual and state tests
        run: pnpm test:web:e2e

      - name: Verify generated API contracts have no drift
        run: |
          pnpm openapi:generate
          git diff --exit-code -- docs/openapi.json packages/contracts/src/generated.ts
